services:
  - type: web
    name: smart-bharat-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter "@workspace/api-server..." run build
    startCommand: pnpm --filter "@workspace/api-server" run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false

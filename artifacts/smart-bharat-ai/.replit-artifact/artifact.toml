kind = "web"
previewPath = "/"
title = "Smart Bharat AI"
version = "1.0.0"
id = "artifacts/smart-bharat-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20887

[services.development]
run = "pnpm --filter @workspace/smart-bharat-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-bharat-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/smart-bharat-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20887"
BASE_PATH = "/"
